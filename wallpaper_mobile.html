<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Year Progress Mobile</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;}
#app{width:100vw;height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#060606;}
#face-bg{position:absolute;inset:0;background-size:cover;background-position:center 10%;opacity:0.22;mask-image:radial-gradient(ellipse 70% 100% at 50% 30%, black 40%, transparent 100%);-webkit-mask-image:radial-gradient(ellipse 70% 100% at 50% 30%, black 40%, transparent 100%);z-index:0;transition:opacity 0.6s;}
#ui{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;}
#day-name{font-size:12px;color:#555;letter-spacing:0.18em;text-transform:uppercase;}
#clock{display:flex;align-items:baseline;gap:8px;}
#clock-time{font-size:60px;font-weight:200;color:#fff;letter-spacing:-3px;line-height:1;}
#ampm{font-size:18px;font-weight:300;color:#555;letter-spacing:0.05em;}
#date-str{font-size:12px;color:#555;letter-spacing:0.1em;}
#year-info{font-size:10px;color:#444;letter-spacing:0.12em;text-transform:uppercase;margin-top:2px;}
#dot-grid{display:grid;margin-top:6px;}
.dot{border-radius:50%;cursor:default;transition:transform 0.12s;}
.dot.future{background:#202020;}
.dot.cement{background:#3a3a3a;}
.dot.today{background:#fff;box-shadow:0 0 5px rgba(255,255,255,0.4);}
.dot.success{background:#d4621a;}
.dot.fail{background:#b52b2b;}
.dot.today-s{background:#d4621a;box-shadow:0 0 5px rgba(212,98,26,0.6);}
.dot.today-f{background:#b52b2b;box-shadow:0 0 5px rgba(181,43,43,0.6);}
.dot:hover{transform:scale(1.7);z-index:2;}
#pbar{width:min(80vw,400px);height:1.5px;background:#181818;border-radius:1px;margin-top:10px;}
#pfill{height:100%;background:#d4621a;border-radius:1px;transition:width 2s;}
/* stats now in side tab */
.stat-row{display:flex;flex-direction:column;align-items:center;width:100%;}
.stat-row .sv{font-size:17px;font-weight:500;color:#eee;text-align:center;line-height:1.1;}
.stat-row .sl{font-size:8px;color:#444;letter-spacing:0.12em;text-transform:uppercase;text-align:center;margin-top:1px;}
.stats-block{display:flex;flex-direction:column;gap:10px;width:100%;align-items:center;}
/* Side tab */
#side-tab{position:fixed;right:-100px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;gap:14px;background:rgba(10,10,10,0.9);border:1px solid #1e1e1e;border-right:none;border-radius:16px 0 0 16px;padding:18px 10px;transition:right 0.35s cubic-bezier(0.4,0,0.2,1);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
#side-tab.open{right:0;}
#side-trigger{position:fixed;right:0;top:50%;transform:translateY(-50%);width:20px;height:70px;z-index:99;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#side-trigger-bar{width:3px;height:44px;background:rgba(255,255,255,0.1);border-radius:2px;transition:background 0.2s;}
#side-trigger:hover #side-trigger-bar{background:rgba(255,255,255,0.3);}
.stab-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;border:1px solid #2a2a2a;background:#0e0e0e;color:#555;font-size:20px;cursor:pointer;transition:all 0.2s;position:relative;}
.stab-btn:hover{border-color:#555;color:#eee;}
.stab-btn.sel-s{border-color:#d4621a;color:#d4621a;background:rgba(212,98,26,0.1);}
.stab-btn.sel-f{border-color:#b52b2b;color:#b52b2b;background:rgba(181,43,43,0.1);}
.stab-btn .stip{display:none;position:absolute;right:50px;top:50%;transform:translateY(-50%);background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;font-size:9px;color:#aaa;padding:3px 8px;white-space:nowrap;pointer-events:none;}
.stab-btn:hover .stip{display:block;}
/* Divider in side tab */
.stab-divider{width:24px;height:1px;background:#1e1e1e;}
/* Image upload button */
#img-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;border:1px solid #2a2a2a;background:#0e0e0e;color:#555;font-size:16px;cursor:pointer;transition:all 0.2s;position:relative;}
#img-btn:hover{border-color:#555;color:#eee;}
#img-btn .stip{display:none;position:absolute;right:50px;top:50%;transform:translateY(-50%);background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;font-size:9px;color:#aaa;padding:3px 8px;white-space:nowrap;pointer-events:none;}
#img-btn:hover .stip{display:block;}
/* No-image button */
#no-img-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;border:1px solid #2a2a2a;background:#0e0e0e;color:#555;font-size:13px;cursor:pointer;transition:all 0.2s;position:relative;}
#no-img-btn:hover{border-color:#555;color:#eee;}
#no-img-btn .stip{display:none;position:absolute;right:50px;top:50%;transform:translateY(-50%);background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;font-size:9px;color:#aaa;padding:3px 8px;white-space:nowrap;pointer-events:none;}
#no-img-btn:hover .stip{display:block;}
#file-input{display:none;}
/* Opacity slider */
#opacity-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
#opacity-wrap .stip{display:none;position:absolute;right:50px;top:50%;transform:translateY(-50%);background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;font-size:9px;color:#aaa;padding:3px 8px;white-space:nowrap;pointer-events:none;}
#opacity-wrap:hover .stip{display:block;}
#opacity-slider{-webkit-appearance:none;appearance:none;width:4px;height:60px;background:linear-gradient(to bottom, #d4621a 0%, #1e1e1e 100%);border-radius:2px;outline:none;cursor:pointer;writing-mode:vertical-lr;direction:rtl;}
#opacity-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:10px;height:10px;border-radius:50%;background:#fff;cursor:pointer;}
#opacity-label{font-size:8px;color:#444;letter-spacing:0.05em;}
#tooltip{position:fixed;background:#111;border:1px solid #252525;border-radius:5px;padding:4px 9px;font-size:10px;color:#aaa;pointer-events:none;display:none;z-index:99;}
</style>
</head>
<body>
<div id="app">
  <div id="face-bg"></div>
  <div id="ui">
    <div id="day-name"></div>
    <div id="clock"><span id="clock-time"></span><span id="ampm"></span></div>
    <div id="date-str"></div>
    <div id="year-info"></div>
    <div id="dot-grid"></div>
    <div id="pbar"><div id="pfill" style="width:0%"></div></div>

  </div>
  <div id="side-trigger" onclick="toggleTab()"><div id="side-trigger-bar"></div></div>
  <div id="side-tab">
    <!-- Mark buttons -->
    <div class="stab-btn" id="btn-s" onclick="setMark('success')">&#10003;<span class="stip">Success</span></div>
    <div class="stab-btn" id="btn-f" onclick="setMark('fail')">&#10007;<span class="stip">Failed</span></div>
    <div class="stab-btn" id="btn-r" onclick="resetMark()" style="font-size:15px;">&#8635;<span class="stip">Reset today</span></div>
    <!-- Divider -->
    <div class="stab-divider"></div>
    <!-- Stats -->
    <div class="stats-block">
      <div class="stat-row"><div class="sv" id="s-done">0</div><div class="sl">Day</div></div>
      <div class="stat-row"><div class="sv" id="s-succ" style="color:#d4621a">0</div><div class="sl">Win</div></div>
      <div class="stat-row"><div class="sv" id="s-fail" style="color:#b52b2b">0</div><div class="sl">Loss</div></div>
      <div class="stat-row"><div class="sv" id="s-left" style="color:#555">0</div><div class="sl">Left</div></div>
    </div>
    <!-- Divider -->
    <div class="stab-divider"></div>
    <!-- Image controls -->
    <div id="img-btn" onclick="document.getElementById('file-input').click()">&#128247;<span class="stip">Change photo</span></div>
    <div id="no-img-btn" onclick="clearBg()">&#9940;<span class="stip">Remove photo</span></div>
    <!-- Opacity slider -->
    <div id="opacity-wrap">
      <input type="range" id="opacity-slider" min="5" max="60" value="22" step="1" oninput="setOpacity(this.value)" title="Photo opacity">
      <div id="opacity-label">22%</div>
      <span class="stip">Photo opacity</span>
    </div>
  </div>
  <input type="file" id="file-input" accept="image/*" onchange="loadImage(event)">
  <div id="tooltip"></div>
</div>

function isLeap(y){return(y%4===0&&y%100!==0)||y%400===0;}
function doy(d){return Math.floor((d-new Date(d.getFullYear(),0,0))/864e5);}
function daysInYear(y){return isLeap(y)?366:365;}
function load(y){try{return JSON.parse(localStorage.getItem('ypwm_'+y)||'{}');}catch(e){return{};}}
function save(y,data){try{localStorage.setItem('ypwm_'+y,JSON.stringify(data));}catch(e){}}

let data={};

// --- Background image management ---
function initBg(){
  const saved=localStorage.getItem('ypwm_bg');
  const opacity=localStorage.getItem('ypwm_opacity')||'22';
  const bg=document.getElementById('face-bg');
  if(saved==='none'){
    bg.style.backgroundImage='none';
    bg.style.opacity='0';
  } else if(saved){
    bg.style.backgroundImage="url('"+saved+"')";
    bg.style.opacity=(parseInt(opacity)/100).toString();
  } else {
    bg.style.backgroundImage="url('data:image/jpeg;base64,"+DEFAULT_B64+"')";
    bg.style.opacity=(parseInt(opacity)/100).toString();
  }
  document.getElementById('opacity-slider').value=opacity;
  document.getElementById('opacity-label').textContent=opacity+'%';
}

function loadImage(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const dataUrl=e.target.result;
    // Store in localStorage (warn if too large)
    try{
      localStorage.setItem('ypwm_bg',dataUrl);
    }catch(err){
      alert('Image too large to save. Try a smaller image (under 2MB).');
      return;
    }
    const bg=document.getElementById('face-bg');
    bg.style.backgroundImage="url('"+dataUrl+"')";
    const op=document.getElementById('opacity-slider').value;
    bg.style.opacity=(parseInt(op)/100).toString();
  };
  reader.readAsDataURL(file);
  event.target.value='';
}

function clearBg(){
  localStorage.setItem('ypwm_bg','none');
  const bg=document.getElementById('face-bg');
  bg.style.backgroundImage='none';
  bg.style.opacity='0';
}

function setOpacity(val){
  localStorage.setItem('ypwm_opacity',val);
  document.getElementById('opacity-label').textContent=val+'%';
  const saved=localStorage.getItem('ypwm_bg');
  if(saved!=='none'){
    document.getElementById('face-bg').style.opacity=(parseInt(val)/100).toString();
  }
}

// --- Mark ---
function setMark(m){
  const now=new Date(),y=now.getFullYear(),today=doy(now);
  data=load(y);data[today]=m;save(y,data);buildGrid();
  document.getElementById('btn-s').className='stab-btn'+(m==='success'?' sel-s':'');
  document.getElementById('btn-f').className='stab-btn'+(m==='fail'?' sel-f':'');
  setTimeout(()=>document.getElementById('side-tab').classList.remove('open'),700);
}
function resetMark(){
  const now=new Date(),y=now.getFullYear(),today=doy(now);
  data=load(y);delete data[today];save(y,data);buildGrid();
  document.getElementById('btn-s').className='stab-btn';
  document.getElementById('btn-f').className='stab-btn';
  setTimeout(()=>document.getElementById('side-tab').classList.remove('open'),500);
}

// --- Grid ---
function buildGrid(){
  const now=new Date(),y=now.getFullYear(),total=daysInYear(y),today=doy(now);
  data=load(y);
  document.getElementById('year-info').textContent=y+' \u00b7 '+total+' days';
  const rows=20,cols=Math.ceil(total/rows);
  const dotSize=Math.max(6,Math.min(14,Math.floor((window.innerWidth*0.82)/(cols*1.6))));
  const gap=Math.max(3,Math.floor(dotSize*0.45));
  const g=document.getElementById('dot-grid');
  g.style.gridTemplateColumns='repeat('+cols+','+dotSize+'px)';
  g.style.gap=gap+'px';
  g.innerHTML='';
  let sc=0,fc=0;
  for(let i=1;i<=total;i++){
    const dot=document.createElement('div');
    dot.className='dot';
    dot.style.width=dotSize+'px';
    dot.style.height=dotSize+'px';
    const st=data[i];
    if(i<today){
      if(st==='success'){dot.classList.add('success');sc++;}
      else if(st==='fail'){dot.classList.add('fail');fc++;}
      else dot.classList.add('cement');
    }else if(i===today){
      if(st==='success'){dot.classList.add('today-s');sc++;}
      else if(st==='fail'){dot.classList.add('today-f');fc++;}
      else dot.classList.add('today');
    }else dot.classList.add('future');
    dot.addEventListener('mouseenter',e=>{
      const tip=document.getElementById('tooltip');
      const d=new Date(y,0,i);
      const st2=data[i];let status=i<today?(st2||'no data'):i===today?'today'+(st2?' \u00b7 '+st2:''):'future';
      tip.textContent=MN[d.getMonth()]+' '+d.getDate()+' \u00b7 Day '+i+' \u00b7 '+status;
      tip.style.display='block';tip.style.left=(e.pageX+14)+'px';tip.style.top=(e.pageY-22)+'px';
    });
    dot.addEventListener('mouseleave',()=>{document.getElementById('tooltip').style.display='none';});
    g.appendChild(dot);
  }
  document.getElementById('s-done').textContent=today;
  document.getElementById('s-succ').textContent=sc;
  document.getElementById('s-fail').textContent=fc;
  document.getElementById('s-left').textContent=total-today;
  document.getElementById('pfill').style.width=Math.round(today/total*100)+'%';
}

// --- Clock ---
function tick(){
  const now=new Date();
  let hr=now.getHours();const ampm=hr>=12?'PM':'AM';hr=hr%12||12;
  const h=String(hr).padStart(2,'0'),m=String(now.getMinutes()).padStart(2,'0'),s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').textContent=h+':'+m+':'+s;
  document.getElementById('ampm').textContent=ampm;
  document.getElementById('day-name').textContent=DN[now.getDay()];
  document.getElementById('date-str').textContent=now.getDate()+' \u00b7 '+MN[now.getMonth()]+' \u00b7 '+now.getFullYear();
}

// --- Side tab ---
function toggleTab(){document.getElementById('side-tab').classList.toggle('open');}
document.addEventListener('click',function(e){
  const tab=document.getElementById('side-tab'),trigger=document.getElementById('side-trigger');
  if(tab&&!tab.contains(e.target)&&!trigger.contains(e.target))tab.classList.remove('open');
});
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const nearRight=touchStartX>window.innerWidth-40;
  const tab=document.getElementById('side-tab');
  if(nearRight&&dx<-30)tab.classList.add('open');
  if(!nearRight&&dx>30&&tab.classList.contains('open'))tab.classList.remove('open');
});
window.addEventListener('resize',buildGrid);

initBg();buildGrid();tick();
setInterval(tick,1000);setInterval(buildGrid,60000);
</script>
